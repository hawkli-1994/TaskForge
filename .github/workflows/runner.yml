name: Build Local Runner

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-runner:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: taskforge-runner
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: taskforge-runner
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: taskforge-runner.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --bin taskforge-runner --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Prepare release asset name
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            dst="target/${{ matrix.target }}/release/taskforge-runner-${{ matrix.target }}.exe"
          else
            dst="target/${{ matrix.target }}/release/taskforge-runner-${{ matrix.target }}"
          fi
          cp "$src" "$dst"
          echo "asset=$dst" >> "$GITHUB_ENV"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskforge-runner-${{ matrix.target }}
          path: ${{ env.asset }}
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.asset }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
