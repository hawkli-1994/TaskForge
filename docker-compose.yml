services:
  postgres:
    image: postgres:17-alpine
    container_name: taskforge-postgres
    environment:
      POSTGRES_USER: taskforge
      POSTGRES_PASSWORD: taskforge
      POSTGRES_DB: taskforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskforge -d taskforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskforge-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: taskforge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: taskforge
      MINIO_ROOT_PASSWORD: taskforge-taskforge
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: ghcr.io/hawkli-1994/taskforge-api:latest
    container_name: taskforge-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: ${DATABASE_URL:-postgresql://taskforge:taskforge@postgres:5432/taskforge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      GITLAB_API_TOKEN: ${GITLAB_API_TOKEN:-}
      GITLAB_BASE_URL: ${GITLAB_BASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: ghcr.io/hawkli-1994/taskforge-web:latest
    container_name: taskforge-web
    ports:
      - "3000:3000"
    environment:
      TASKFORGE_API_URL: ${TASKFORGE_API_URL:-http://api:3001}
    depends_on:
      - api
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: ghcr.io/hawkli-1994/taskforge-worker:latest
    container_name: taskforge-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://taskforge:taskforge@postgres:5432/taskforge}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
